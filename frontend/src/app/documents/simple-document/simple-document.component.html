<p-card
    class="w-full !rounded-xl border border-surface-700/40 hover:bg-surface-800/40 hover:border-primary-500/40 transition-colors">
    <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-lg flex items-center justify-center bg-primary-500/15 text-primary-400">
            <i class="pi text-sm" [ngClass]="fileIcon()"></i>
        </div>

        <div class="min-w-0 flex-1">
            <div class="flex items-center gap-2">
                <span class="font-medium truncate">{{ document().title }}</span>

                <span class="px-2 py-0.5 text-xs rounded-full border border-surface-600/60 text-foreground/80">
                    {{ document().size | fileSize }}
                </span>
            </div>

            <div class="mt-0.5 text-xs opacity-70 flex items-center gap-2">
                <span>{{ document().originalFilename | fileExtension }}</span>
                <span class="flex items-center gap-1">
                    <i class="pi pi-calendar"></i>
                    {{ document().uploadedAt | date:'short' }}
                </span>
            </div>
        </div>

        <button pButton type="button" class="p-button-rounded p-button-text" icon="pi pi-download"
            pTooltip="Download document" (click)="download()"></button>

        @if (isOwner()) {
        <button pButton type="button" class="p-button-rounded p-button-text p-button-danger" icon="pi pi-trash"
            pTooltip="Delete document" (click)="delete()" [loading]="deleting()" [disabled]="deleting()"></button>
        }

        <button pButton type="button" class="p-button-rounded p-button-text" icon="pi pi-info-circle"
            pTooltip="Document information" (click)="openInfo()"></button>

        <button pButton type="button" class="p-button-rounded p-button-text" icon="pi pi-arrow-right"
            pTooltip="Open document" (click)="openDocument()"></button>
    </div>
</p-card>
