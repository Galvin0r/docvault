<div class="min-h-screen w-full flex items-center justify-center p-4">
  <p-card
    class="p-4 w-full max-w-md bg-white/10 dark:bg-zinc-900/30 !backdrop-blur-md border border-white/20 dark:border-white/10 !shadow-2xl !rounded"
  >
    <ng-template pTemplate="content">
      <div class="flex flex-col items-center">
        <app-logo />
        <h1 class="text-2xl font-semibold tracking-tight">Forgot password?</h1>
        <label class="font-thin">No worries, we will send you reset instructions.</label>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-8 space-y-4">
        @if (incorrectEmail) {
        <p-message
          severity="error"
          class="inline-block flex w-full justify-between"
          [closable]="true"
          (onClose)="onErrorClose()"
        >
          User with this email doesn not exist.
        </p-message>
        } @else if (notActiveAccount) {
        <p-message
          severity="error"
          class="inline-block flex w-full justify-between"
          [closable]="true"
          (onClose)="onErrorClose()"
        >
          Account is not activated.
        </p-message>
        }
        <div class="flex flex-col space-y-1">
          <label class="font-semibold">Email</label>
          <p-input-group>
            <p-inputgroup-addon>
              <i class="pi pi-at"></i>
            </p-inputgroup-addon>
            <input
              pInputText
              type="test"
              formControlName="email"
              [ngClass]="{
                'p-invalid': isInvalid('email'),
                'p-valid': isValid('email')
              }"
              [attr.aria-invalid]="isInvalid('email')"
            />
          </p-input-group>
          <!-- prettier-ignore -->
          @if (isInvalid('email')) { 
          @if(hasError('email', 'required')) {
          <p-message severity="error" variant="simple" size="small">Email is required</p-message>
          } @else if (hasError('email', 'email')) {
          <p-message severity="error" variant="simple" size="small">Not a valid email</p-message>
          } }
        </div>

        <div class="flex justify-center w-full mt-5">
          <button pButton class="w-2/3 !rounded font-semibold" type="submit">Reset password</button>
        </div>
      </form>
    </ng-template>
  </p-card>
</div>
