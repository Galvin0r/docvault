<app-auth-card [title]="'Check your email'">
  <form card-body [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 mt-1">
    <div class="flex flex-col items-center">
      <label class="font-normal">We sent a verification code to</label>
      <label class="font-medium">{{ email }}</label>
    </div>
    <app-form-error [error]="error" (onClose)="onErrorClose()" />
    <div class="flex flex-col space-y-8 items-center mt-6">
      <p-input-otp formControlName="code" [integerOnly]="true" [length]="6" />
      <button pButton class="w-2/3 !rounded font-semibold" type="submit">Verify email</button>
    </div>
  </form>

  <div card-footer class="flex justify-center mt-6">
    <label>Didn't receive an email?</label>
    @if (cooldown > 0) {
    <span class="ml-1 text-gray-400">Try again in {{ cooldown }}s</span>
    } @else {
    <a class="ml-1" (click)="onResend()">Click to resend</a>
    }
  </div>
</app-auth-card>
