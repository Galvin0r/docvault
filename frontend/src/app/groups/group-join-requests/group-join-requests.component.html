<p-card class="small-padding rounded-2xl shadow-lg border border-surface-700/30 pt-2">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-base font-semibold flex items-center gap-2">
      <i class="pi pi-user-plus text-sm"></i>
      Group Join Requests
    </h2>
    <p-badge [value]="searchStore.items().totalElements" severity="contrast"></p-badge>
  </div>

  <div class="flex flex-col">
    <p-dataview #dc [value]="searchStore.items().content">
      <ng-template #list let-items>
        <div class="flex flex-col gap-1/2">
          @for (item of items; track item.id) {
          <app-group-join-request
            [request]="item"
            class="mb-2"
            (accept)="onAccept($event)"
            (reject)="onReject($event)"
          />
          }
        </div>
      </ng-template>
    </p-dataview>

    <app-paginator
      [total]="searchStore.items().totalElements"
      [page]="page()"
      [size]="size()"
      [isSimplePaginator]="true"
      (pageChange)="onPageChange($event)"
    />
  </div>
</p-card>
