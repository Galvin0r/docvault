<div class="p-4">
  <form [formGroup]="form" class="space-y-4" (ngSubmit)="submit()">
    <div class="space-y-1">
      <p-floatlabel variant="on">
        <input
          id="name"
          pInputText
          formControlName="name"
          class="w-full"
          [ngClass]="{
            'p-invalid': isInvalid('name'),
            'p-valid': isValid('name')
          }"
          [attr.aria-invalid]="isInvalid('name')"
        />
        <label for="name">Name</label>
      </p-floatlabel>
      @if (isInvalid('name')) {
      <p-message severity="error" variant="simple" size="small">Group name is required</p-message>
      }
    </div>

    <p-floatlabel variant="on">
      <textarea
        id="description"
        style="resize: none"
        pTextarea
        rows="4"
        formControlName="description"
        class="w-full"
      ></textarea>
      <label for="description">Description (optional)</label>
    </p-floatlabel>

    <div class="flex flex-col space-y-2">
      <label class="text-sm opacity-80">Visibility</label>
      <p-selectButton
        formControlName="visibility"
        [options]="visibilityOptions"
        optionLabel="label"
        optionValue="value"
      ></p-selectButton>
    </div>

    <div class="flex justify-end gap-2 pt-2">
      <button pButton type="button" (click)="ref.close()" severity="secondary" outlined="true">Cancel</button>
      <button pButton type="submit">{{ form.value.id ? 'Save' : 'Create' }}</button>
    </div>
  </form>
</div>
