<div class="flex flex-col gap-4">
    <p class="text-sm text-muted-color">
        Add <span class="font-semibold">{{ userLogin }}</span> to one of your groups
    </p>

    @if (loading()) {
    <div class="flex items-center justify-center py-4">
        <i class="pi pi-spin pi-spinner text-2xl"></i>
    </div>
    } @else if (groups().length === 0) {
    <div class="text-sm text-muted-color italic py-4 text-center">
        You don't have any groups where you can add members.
    </div>
    } @else {
    <p-floatlabel variant="on">
        <p-select id="groupSelect" [options]="groups()" optionLabel="groupName" [formControl]="selectedGroup"
            class="w-full" appendTo="body">
            <ng-template #item let-group>
                <div class="flex items-center gap-2">
                    <i class="pi pi-users text-sm text-primary-400"></i>
                    <span>{{ group.groupName }}</span>
                    <span class="ml-auto text-xs text-surface-500">{{ group.role | titlecase }}</span>
                </div>
            </ng-template>
        </p-select>
        <label for="groupSelect">Select Group</label>
    </p-floatlabel>
    }

    <div class="flex gap-2 justify-end pt-2">
        <button pButton type="button" label="Cancel" class="p-button-text" (click)="onCancel()"
            [disabled]="submitting()"></button>
        <button pButton type="button" label="Add to Group" icon="pi pi-user-plus" (click)="onSubmit()"
            [disabled]="selectedGroup.invalid || submitting() || groups().length === 0"
            [loading]="submitting()"></button>
    </div>
</div>
