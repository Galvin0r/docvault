<p-dataview #dc [value]="searchStore.items().content">
  <ng-template #list let-items>
    <div class="flex flex-col gap-1">
      @for (item of items; track item.userId) {
      <app-user
        [membership]="item"
        [canManageRole]="canManageRole()"
        [canRemove]="canRemove() && item.role === 'USER'"
        (userRemoved)="refresh()"
        (userChangedRole)="onRoleChange()"
      />
      }
    </div>
  </ng-template>
</p-dataview>
<app-paginator
  [total]="searchStore.items().totalElements"
  [sizeOptions]="limitOptions()"
  [page]="page()"
  [size]="size()"
  (pageChange)="onPageChange($event)"
  (sizeChange)="onSizeChange($event)"
/>
