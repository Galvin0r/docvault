name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAVEN_OPTS: -XX:+EnableDynamicAgentLoading

jobs:
  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend unit tests
        working-directory: backend
        run: ./mvnw -B -DskipITs=true -Djacoco.skip=true test

      - name: Upload backend unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-reports
          path: backend/target/surefire-reports/

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Check Docker
        run: docker info

      - name: Run backend integration tests
        working-directory: backend
        run: ./mvnw -B -DskipUnitTests=true -DskipITs=false -Djacoco.skip=true verify

      - name: Upload backend integration test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-reports
          path: backend/target/failsafe-reports/

  frontend:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --configuration production

  processor:
    name: Processor Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run processor tests
        working-directory: processor
        run: mvn -B test
