name: CI - Test & Publish Docker

on:
  push:
    tags:
      - 'v*'

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          # Make sure we have origin/main
          git fetch origin main

          echo "Commit: $GITHUB_SHA"
          echo "Remote branches containing this commit:"
          git branch -r --contains "$GITHUB_SHA" || true

          if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Tag is on main"
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag is NOT on main, skipping pipeline."
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  build-test-and-publish:
    needs: check-tag
    if: needs.check-tag.outputs.on_main == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_BACKEND: ghcr.io/galvin0r/docvault-backend
      IMAGE_FRONTEND: ghcr.io/galvin0r/docvault-frontend
      IMAGE_PROCESSOR: ghcr.io/galvin0r/docvault-processor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        # Backend

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Backend - run tests
        working-directory: backend
        run: ./mvnw -B -DskipITs=true -Djacoco.skip=true test

      - name: Backend - run integration tests
        working-directory: backend
        run: ./mvnw -B -DskipUnitTests=true -DskipITs=false -Djacoco.skip=true verify

      - name: Backend - package app (no tests)
        working-directory: backend
        run: ./mvnw -B package -DskipTests -Djacoco.skip=true

        # Frontend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.0
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend - install deps
        working-directory: frontend
        run: npm ci

      - name: Frontend - run tests
        working-directory: frontend
        run: npm run test:ci

      - name: Frontend - build production
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: E2E - install Playwright Chrome
        working-directory: frontend
        run: npx playwright install --with-deps chrome

      - name: E2E - run tests
        working-directory: frontend
        run: npm run e2e

      - name: E2E - upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/

      - name: E2E - clean up stack
        if: always()
        working-directory: frontend
        run: npm run poste2e

        # Processor

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Processor - run tests (via Maven)
        working-directory: processor
        run: mvn -B test

        # Docker

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t $IMAGE_BACKEND:latest \
            -t $IMAGE_BACKEND:$GITHUB_REF_NAME \
            backend

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t $IMAGE_FRONTEND:latest \
            -t $IMAGE_FRONTEND:$GITHUB_REF_NAME \
            frontend

      - name: Build processor image
        run: |
          docker build \
            -f processor/Dockerfile \
            -t $IMAGE_PROCESSOR:latest \
            -t $IMAGE_PROCESSOR:$GITHUB_REF_NAME \
            processor

      - name: Push backend image
        run: |
          docker push $IMAGE_BACKEND:latest
          docker push $IMAGE_BACKEND:$GITHUB_REF_NAME

      - name: Push frontend image
        run: |
          docker push $IMAGE_FRONTEND:latest
          docker push $IMAGE_FRONTEND:$GITHUB_REF_NAME

      - name: Push processor image
        run: |
          docker push $IMAGE_PROCESSOR:latest
          docker push $IMAGE_PROCESSOR:$GITHUB_REF_NAME
