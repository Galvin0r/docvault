spring.application.name=docvault
spring.profiles.active=dev

# Multipart files
spring.servlet.multipart.max-file-size=4GB
spring.servlet.multipart.max-request-size=4GB
spring.servlet.multipart.file-size-threshold=0
spring.servlet.multipart.location=/tmp/docvault-multipart
server.tomcat.max-swallow-size=-1

# Local frontend url
app.frontend.url=http://localhost:4200

# Local Datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/docvault
spring.datasource.username=postgres
spring.datasource.password=12345

# Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.web.error.include-message=always
server.servlet.context-path=/api

# Liquibase configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog.xml

# Mail configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

